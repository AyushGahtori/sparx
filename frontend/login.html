<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPARX Sign In</title>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/dashboard.css">
  <link rel="stylesheet" href="./css/forms.css">
</head>
<body data-page="login">
  <main class="page-content">
    <div class="page-grid" style="max-width: 720px; margin: 0 auto; padding-top: 8vh;">
      <section class="panel page-intro">
        <span class="eyebrow">Secure Access</span>
        <h2>Sign in to SPARX</h2>
        <p>Authenticate with Firebase before accessing outbound calls, campaigns, callback operations, summaries, and calendar workflows.</p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Operator Sign-In</h2>
            <p class="panel-subtitle">Use your approved Firebase account to continue.</p>
          </div>
        </div>
        <div id="login-message"></div>
        <div class="form-actions">
          <button id="google-sign-in-button" class="button primary" type="button">Continue With Google</button>
        </div>
      </section>
    </div>
  </main>

  <div id="toast-root" class="toast-root"></div>

  <script src="./runtime-config.js"></script>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
